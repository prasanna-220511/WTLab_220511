<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function(){


            $("#clickBtn").click(function(){
                alert("Button Clicked");
           });


            $("#dblBtn").dblclick(function(){
               alert("Button Double Clicked");
            });


            $("#box").mouseenter(function(){
                $(this).css("background","lightblue");
            });


            $("#box").mouseleave(function(){
                $(this).css("background","lightgray");
            });


            $("#hoverBox").hover(function(){
                $(this).css("background","yellow");
            }, function(){
                $(this).css("background","white");
            });


            $("#mouseBtn").mousedown(function(){
                $("#mouseMsg").text("Mouse Button Pressed");
            });


            $("#mouseBtn").mouseup(function(){
                $("#mouseMsg").text("Mouse Button Released");
            });



            $("#textInput").keypress(function(){
                $("#keyMsg").text("Key Pressed");
            });


            $("#textInput").keydown(function(){
                $("#keyMsg").text("Key Down");
            });


            $("#textInput").keyup(function(){
                $("#keyMsg").text("Key Released");
            });

            $("#myForm").submit(function(){
                alert("Form Submitted");
            });

            $("#course").change(function(){
                alert("Course changed to: " + $(this).val());
            });


            $("#name").focus(function(){
                $(this).css("background","lightyellow");
            });


            $("#name").blur(function(){
                $(this).css("background","white");
            });

            $("#onBtn").on("click", function(){
                $("#onMsg").text("Event attached using ON");
            });


            $("#offBtn").click(function(){
                $("#onBtn").off("click");
                $("#onMsg").text("Event removed using OFF");
            });

});

    </script>

</head>
<body>

    <button id="clickBtn">Click</button>
<button id="dblBtn">Double Click</button>

<br><br>

<div id="box" style="width:200px;height:100px;background:lightgray;">
Mouse Enter / Leave
</div>

<br>

<div id="hoverBox" style="width:200px;height:100px;border:1px solid black;">
Hover Over Me
</div>

<br>

<button id="mouseBtn">Mouse Down / Up</button>
<p id="mouseMsg"></p>


<h2>Keyboard Events</h2>

<input type="text" id="textInput" placeholder="Type here">
<p id="keyMsg"></p>


<h2>Form Events</h2>

<form id="myForm">
Name: <input type="text" id="name"><br><br>

Course:
<select id="course">
<option value="HTML">HTML</option>
<option value="CSS">CSS</option>
<option value="JavaScript">JavaScript</option>
</select>

<br><br>

<input type="submit" value="Submit">
</form>


<h2>General Event Methods</h2>

<button id="onBtn">Attach Event</button>
<button id="offBtn">Remove Event</button>

<p id="onMsg"></p>
    
</body>
</html>
