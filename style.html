<!DOCTYPE html>
<html>
<head>
<title>Style</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
.dark{
background:black;
color:white;
}
</style>
</head>
<body>

<h2 id="text">Theme Changer</h2>

<button id="toggle">Toggle Theme</button>

<script>
$("#toggle").click(function(){
$("body").toggleClass("dark");
});
</script>

</body>
</html>
