<!DOCTYPE html>
<html>
<head>
<title>Selectors</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Image Gallery</h2>

<img src="https://picsum.photos/200?1" class="img">
<img src="https://picsum.photos/200?2" id="mainImg">
<img src="https://picsum.photos/200?3" class="img">

<script>
$("img").css("border","5px solid white");
$("#mainImg").css("border","5px solid yellow");
$(".img").hover(function(){
$(this).css("transform","scale(1.1)");
},function(){
$(this).css("transform","scale(1)");
});
</script>

</body>
</html>
