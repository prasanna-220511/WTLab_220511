<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // hierarchy
            $('div p').css('color', 'orange');
            $('ul>li').css('background-color', 'purple');
            $('h2+p').css('font-weight', 'bold');
            $('h2~p').css('text-decoration', 'underline');
            $('ul>li:first-child').css('color', 'white');

            // filter
            $('p:first').css('color', 'pink');
            $('p:last').css('color', 'cyan');
            $('p:even').css('background-color', 'black');
            $('p:odd').css('background-color', 'lightgray');
            $('p:eq(2)').css('font-size', '80px');
            $('p:gt(4)').css('color', 'red');
            $('p:lt(4)').css('color', 'brown');
            $('p:not(.test)').css('border', '2px solid blue');

        })
    </script>
</head>
<body>
    <h1 id="title">jQuery Selectors Example</h1>

    <h2>Heading Example</h2>

        <p>This is paragraph 1</p>
        <p class="highlight">This is paragraph 2</p>

    <div class="highlight">
        <p>This is a div with class highlight</p>
    </div>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <p>
            <ol>
                <li>Subitem 1</li>
                <li>Subitem 2</li>
            </ol>
        </p>
    </ul>

    <h2>Heading 2</h2>
    <p>This is paragraph 3</p>
    <p>This is paragraph 4</p>
    <p>Paragraph 5</p>
    <p class="test">Paragraph 6</p>
    <p>Paragraph 7</p>
    <p>Paragraph 8</p>



</body>

<script>
    $('#title').css('color','red');
    $('div.highlight').css('background-color','green');
    $('p').css('font-size','50px');
    $('h2, p').css('color','blue');
</script>
</html>
