<!DOCTYPE html>
<html>
<head>
<title>Effects</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
#box{
width:100px;
height:100px;
background:white;
position:relative;
margin:auto;
}
</style>
</head>
<body>

<h2>Animation Panel</h2>

<button id="fade">Fade</button>
<button id="slide">Slide</button>
<button id="move">Move</button>

<div id="box"></div>

<script>
$("#fade").click(function(){
$("#box").fadeToggle();
});

$("#slide").click(function(){
$("#box").slideToggle();
});

$("#move").click(function(){
$("#box").animate({left:"200px",opacity:"0.5"});
$("#box").delay(300).animate({top:"100px"});
});
</script>

</body>
</html>
