    <script>
$(document).ready(function(){

    
    $("#changeImg").click(function(){
        $("#myImage").attr("src","https://www.freepik.com/free-photo/pink-flower-white-background_976070.htm#fromView=keyword&page=1&position=0&uuid=8a25b641-bd10-4e4d-82eb-6801a0ff5816&query=Flower");
    });

   
    $("#removeLink").click(function(){
        $("#myLink").removeAttr("href");
    });

   
    $("#enableCheck").click(function(){
        $("#agree").prop("disabled", false);
    });

 
    $("#disableCheck").click(function(){
        $("#agree").prop("disabled", true);
    });


    $("#showValue").click(function(){
        var name = $("#username").val();
        alert("Entered Name: " + name);
    });

});
</script>
</head>
<body>

    <a href="https://google.com">Google</a><br>
    <a href="http://example.com">Example</a><br>
    <a href="https://wikipedia.org">Wikipedia</a><br>
    <a href="http://google.com"> google</a>
    <p>
        google.com
    </p>

    <br>

    <input type="text" placeholder="Enter name">
    <input type="password" placeholder="Enter password">


    <h2>jQuery Methods Demonstration</h2>


<img id="myImage" src="https://www.freepik.com/free-photo/yellow-flower-white-background_976067.htm#fromView=keyword&page=1&position=1&uuid=8a25b641-bd10-4e4d-82eb-6801a0ff5816&query=Flower" width="100"><br><br>
<button id="changeImg">Change Image</button>

<br><br>


<a id="myLink" href="https://google.com">Visit Google</a><br>
<button id="removeLink">Remove Link</button>

<br><br>


<input type="checkbox" id="agree" disabled> I Agree<br>
<button id="enableCheck">Enable Checkbox</button>
<button id="disableCheck">Disable Checkbox</button>

<br><br>


<input type="text" id="username" placeholder="Enter your name">
<button id="showValue">Get Input Value</button>
    
</body>
